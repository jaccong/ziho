name: 测试测试

on:
  workflow_dispatch:   # 手动运行
  ##schedule:
    ##- cron: '30 15 * * 1-5'  # 周一到周五 15:30 自动运行

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本
        run: python test.py

      - name: 提交并推送文件
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.json
          git commit -m "测试 $(date +'%Y-%m-%d')"
          git push
